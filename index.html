<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Guqin Finger-Technique Reference · 古琴指法</title>
  <meta name="description" content="A categorized reference of guqin (古琴) finger techniques as written in jianzipu (减字谱) reduced-character tablature: name, pinyin, reduced glyph, instruction, poetic gesture-image, and sources." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="css/styles.css?v=5" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-glyph" aria-hidden="true">琴</span>
      <div class="brand-text">
        <h1>Guqin Finger-Technique Reference</h1>
        <p class="brand-sub">古琴指法 · jiǎnzìpǔ 减字谱 hand-gesture library</p>
      </div>
    </div>
    <div class="search-wrap">
      <input id="search" type="search" placeholder="Search name, pinyin, instruction…" autocomplete="off" aria-label="Search techniques" />
    </div>
  </header>

  <div class="layout">
    <nav class="sidebar" id="sidebar" aria-label="Categories">
      <button class="nav-item is-active" data-cat="all">
        <span class="nav-label">All techniques</span>
        <span class="nav-count" data-count="all"></span>
      </button>
      <div id="navCategories"></div>
      <a class="nav-item nav-link" href="#gallery">
        <span class="nav-label">Poetic gesture gallery</span>
      </a>
      <a class="nav-item nav-link" href="#composer">
        <span class="nav-label">Jianzipu composer</span>
      </a>
      <a class="nav-item nav-link" href="#resources">
        <span class="nav-label">Resources &amp; sources</span>
      </a>
      <p class="sidebar-foot">Tap a symbol in the index up top to jump to its meaning.</p>
    </nav>

    <main class="content" id="content">
      <section id="symbolIndex" class="symbol-index"></section>
      <div id="results"></div>
      <section id="gallery" class="resources"></section>
      <section id="composer" class="resources"></section>
      <section id="resources" class="resources"></section>
    </main>
  </div>

  <div id="empty" class="empty" hidden>No techniques match your search.</div>

  <script src="js/app.js?v=5"></script>
</body>
</html>
